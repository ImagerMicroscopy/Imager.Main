name: Publish Imager
on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*' 
  pull_request:
    branches: [ "main" ]

jobs:

  build:


    runs-on: windows-latest  # For a list of available runner types, refer to
                             # https://help.github.com/en/actions/reference/workflow-syntax-for-github-actions#jobsjob_idruns-on

    env:
      PROJECT_PATH:   ImagerAvalonia.Desktop
      GUI_PATH: gui
      CORE_PATH: core
      CAMERA_PATH: camera
      TIFFLIB_PATH: tifflib
      SMART_PATH: smart
      PYTHON_VER: "3.13.1"
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        repository: ImagerMicroscopy/Imager.GUI
        ssh-key: ${{ secrets.GUI_CLONE }}
        path: ${{ env.GUI_PATH }}


    - name: Publish GUI
      run:  |
        $guiPath = Join-Path $env:GUI_PATH $env:PROJECT_PATH
        dotnet publish $guipath -r win-x64 -c Release --self-contained true -p:PublishSingleFile=true -p:DebugType=None -p:DebugSymbols=false -p:IsTestProject=false -p:EnableCodeCoverage=false -o Release
  
    - name: Clone Core
      uses: actions/checkout@v4
      with:
         repository: ImagerMicroscopy/Imager.Core
         ssh-key: ${{ secrets.CORE_CLONE }}
         path: ${{ env.CORE_PATH }}


    - name: Build Core
      uses: haskell-actions/setup@v2
      with:
          ghc-version: '8.8.4' # Exact version of ghc to use
          enable-stack: true
          stack-version: 'latest'

    - run: |
             cd $env:CORE_PATH
             stack build . 
             $installRoot = stack path --local-install-root
             New-Item -ItemType Directory -Force -Path build
             New-Item -ItemType Directory -Force -Path build\Plugins
             Copy-Item "$installRoot\bin\*" build -Recurse
             Copy-Item "build\*" -Destination "..\Release" -Recurse -Force
             New-Item -ItemType Directory -Force -Path "..\Release\PluginConfigurations"
            
   
    - name: Clone TiffLib
      uses: actions/checkout@v4
      with: 
         repository: ImagerMicroscopy/Imager.TiffLib
         ssh-key: ${{ secrets.TIFFLIB_CLONE }}
         path: ${{ env.TIFFLIB_PATH }}

    - name: Clone SCCamera
      uses: actions/checkout@v4
      with: 
         lfs: true
         repository: ImagerMicroscopy/Imager.Cameras
         ssh-key: ${{ secrets.CAMERA_CLONE }}
         path: ${{ env.CAMERA_PATH }}
        
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
         python-version: '3.x'
         
    - name: Install Python Dependencies
      run: pip install meson ninja
    - name: Prepare MSVC
      uses: bus1/cabuild/action/msdevshell@v1
      with:
         architecture: x64
         
    - name: Prepare Build
      working-directory: ${{ env.TIFFLIB_PATH }}
      run: |       
         meson setup builddir

    - name: Run TiffLib Build
      working-directory: ${{ env.TIFFLIB_PATH }}
      run: |
         meson compile -C builddir
         New-Item -ItemType Directory -Force -Path "..\Release"
         Copy-Item "builddir\MeasurementImageStorageDLL.dll" -Destination "..\Release"
         Copy-Item "builddir\MeasurementImageStorageDLL.lib" -Destination "..\Release"

    - name: Run Camera Build
      working-directory: ${{ env.CAMERA_PATH }}
      run: |
         cd src
         meson setup builddir
         meson compile -C builddir
         Copy-Item "builddir\SCCamera.imagerplugin" -Destination "..\..\Release\Plugins"


    - name: Clone Smart Program Server
      uses: actions/checkout@v4
      with: 
         repository: ImagerMicroscopy/Imager.Smart
         ssh-key: ${{ secrets.SMART_CLONE }}
         path: ${{ env.SMART_PATH }}
         
    - name: Copy Smart server files
      run: |
        New-Item -ItemType Directory -Force -Path "Release\SmartProgramPython"
        Copy-Item "$env:SMART_PATH\*" -Destination "Release\SmartProgramPython" -Recurse -Force

    - name: Download and Extract Embeddable Python
      run: |
        $url = "https://www.python.org/ftp/python/${{ env.PYTHON_VER }}/python-${{ env.PYTHON_VER }}-embed-amd64.zip"
        Invoke-WebRequest -Uri $url -OutFile python.zip
        Expand-Archive -Path python.zip -DestinationPath ./temp_python
  
    - name: Enable Site-Packages
      run: |
        $pthFile = Get-ChildItem -Path ./temp_python -Filter "*._pth" | Select-Object -First 1
        if ($pthFile) {
            $content = Get-Content $pthFile.FullName
            $content = $content -replace "#import site", "import site"
            Set-Content -Path $pthFile.FullName -Value $content
        }
  
    - name: Install Pip and Requirements
      shell: powershell
      run: |
        $reqPath = Join-Path $env:SMART_PATH "requirements.txt"
        Invoke-WebRequest -Uri "https://bootstrap.pypa.io/get-pip.py" -OutFile get-pip.py
        
        ./temp_python/python.exe get-pip.py --no-warn-script-location
        ./temp_python/python.exe -m pip install setuptools wheel --no-warn-script-location
        if (Test-Path $reqPath) {
            ./temp_python/python.exe -m pip install -r $reqPath --no-warn-script-location --only-binary=:all:        
        }
        Remove-Item get-pip.py
  
    - name: Copy to Release Folder
      run: |
        New-Item -ItemType Directory -Force -Path "Release\python"
        Copy-Item -Path ".\temp_python\*" -Destination "Release\python" -Recurse -Force
          
    - name: Zip release
      # Fix: Don't zip the Release folder into itself (that creates a loop). 
      # Move the zip one level up or use a different name.
      run: Compress-Archive -Path "Release\*" -DestinationPath "Imager-Release-winx64.zip"
  
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Imager-Release-winx64
        path: Imager-Release-winx64.zip

  publish-release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') 
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: Imager-Release-winx64
          path: ./downloaded-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Imager ${{ github.ref_name }}
          tag_name: ${{ github.ref }}
          files: ./downloaded-artifacts/Imager-Release-winx64.zip
          draft: false
          prerelease: false
          generate_release_notes: false 
